services:
  - type: web
    name: roadlens-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MAX_UPLOAD_MB
        value: 200
      - key: FILE_RETENTION_MINUTES
        value: 60
      - key: DELETE_VIDEO_AFTER_DOWNLOAD
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "*"

  - type: web
    name: roadlens-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install --no-fund --no-audit && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
